<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking — Koray Karagozler</title>
  <link rel="icon" type="image/jpeg" href="favicon.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: #fff;
      color: #111;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      padding: 0 3vw;
      height: 44px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ebebeb;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 10;
    }

    .nav-logo {
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #d94f3d;
      text-decoration: none;
    }

    nav a.back {
      text-decoration: none;
      color: #111;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── HEADER ── */
    .page-header {
      padding: 3rem 5vw 2.5rem;
      border-bottom: 1px solid #ebebeb;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .page-header p {
      margin-top: 1rem;
      font-size: 0.9rem;
      line-height: 1.7;
      color: #555;
      max-width: 480px;
    }

    /* ── IFRAME WRAPPER ── */
    .form-wrapper {
      width: 100%;
      background: #fff;
    }

    .form-wrapper iframe {
      width: 100%;
      height: 1200px;   /* generous default; JS resizes via postMessage */
      border: none;
      display: block;
      background: #fff;
    }

    /* Fallback message if iframe blocked */
    .form-fallback {
      display: none;
      padding: 3rem 5vw;
      text-align: center;
    }

    .form-fallback p {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 1.5rem;
    }

    .form-fallback a {
      display: inline-block;
      padding: 0.8rem 2rem;
      border: 1px solid #111;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      color: #111;
      transition: background 0.2s, color 0.2s;
    }

    .form-fallback a:hover {
      background: #111;
      color: #fff;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid #ebebeb;
      padding: 1.5rem 4vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      color: #999;
      text-transform: uppercase;
    }

    footer a { color: #999; text-decoration: none; }
    footer a:hover { color: #111; }

    footer { flex-wrap: wrap; gap: 1rem; }
    .footer-links { display: flex; gap: 2rem; }

    @media (max-width: 480px) {
      footer { flex-direction: column; align-items: flex-start; }
      .footer-links { gap: 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">Koray Karagozler</a>
    <a class="back" href="index.html">← Back</a>
  </nav>

  <div class="page-header">
    <h1>Booking</h1>
    <p>Fill out the form below to submit your tattoo request.
       Koray will get back to you to discuss availability and details.</p>
  </div>

  <div class="form-wrapper" id="formWrapper">
    <iframe
      id="bookingFrame"
      src="https://www.cognitoforms.com/KorayKaragozler1/TATTOOSUBMISSIONFORM"
      allow="payment"
      allowtransparency="true"
      scrolling="no"
      title="Tattoo Submission Form">
    </iframe>
  </div>

  <!-- Fallback if iframe is blocked -->
  <div class="form-fallback" id="formFallback">
    <p>The booking form can be completed on the Cognitoforms website.</p>
    <a href="https://www.cognitoforms.com/KorayKaragozler1/TATTOOSUBMISSIONFORM"
       target="_blank" rel="noopener">Open Booking Form →</a>
  </div>

  <footer>
    <span>© 2026 Koray Karagözler</span>
    <div class="footer-links">
      <a href="https://www.instagram.com/koray_karagozler?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" rel="noopener">Instagram</a>
      <a href="impressum.html">Impressum</a>
      <a href="datenschutz.html">Datenschutz</a>
    </div>
  </footer>

  <script>
    const frame    = document.getElementById('bookingFrame');
    const wrapper  = document.getElementById('formWrapper');
    const fallback = document.getElementById('formFallback');

    /* Auto-resize iframe to full form height via postMessage
       so the page scrolls naturally and the Send button is always reachable */
    window.addEventListener('message', function(e) {
      if (e.origin !== 'https://www.cognitoforms.com') return;
      try {
        const data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
        const h = data && (data.height || data.frameHeight || (data.data && data.data.height));
        if (h && h > 100) {
          frame.style.height = (parseInt(h, 10) + 40) + 'px';
        }
      } catch(err) {}
    });

    /* Fallback: show link if iframe fails to load */
    frame.addEventListener('error', () => {
      wrapper.style.display  = 'none';
      fallback.style.display = 'block';
    });

    let loaded = false;
    frame.addEventListener('load', () => { loaded = true; });
    setTimeout(() => {
      if (!loaded) {
        wrapper.style.display  = 'none';
        fallback.style.display = 'block';
      }
    }, 8000);
  </script>

</body>
</html>
