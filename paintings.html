<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paintings — Koray Karagözler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #fff;
      color: #111;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      padding: 1.5rem 6vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e8e8e8;
    }

    nav a {
      text-decoration: none;
      color: #111;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    nav .site-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      letter-spacing: 0.02em;
      text-transform: none;
    }

    /* ── HEADER ── */
    .page-header {
      padding: 5rem 6vw 4rem;
      border-bottom: 1px solid #e8e8e8;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .page-header p {
      margin-top: 1.25rem;
      font-size: 1rem;
      line-height: 1.7;
      color: #555;
      max-width: 560px;
    }

    /* ── PAINTINGS GRID ── */
    .paintings-grid {
      padding: 4rem 6vw 6rem;
      columns: 2;
      column-gap: 2rem;
    }

    .painting-item {
      break-inside: avoid;
      margin-bottom: 2rem;
      overflow: hidden;
      cursor: zoom-in;
    }

    .painting-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.5s ease;
    }

    .painting-item:hover img {
      transform: scale(1.02);
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute;
      top: 1.5rem;
      right: 2rem;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      opacity: 0.7;
      transition: opacity 0.2s;
      background: none;
      border: none;
    }

    .lightbox-close:hover {
      opacity: 1;
    }

    /* ── FOOTER ── */
    footer {
      padding: 2rem 4vw;
      border-top: 1px solid #e8e8e8;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      color: #888;
    }

    footer a {
      color: #888;
      text-decoration: none;
    }

    footer a:hover {
      color: #111;
    }

    @media (max-width: 600px) {
      .paintings-grid {
        columns: 1;
      }
    }
  </style>
</head>
<body>

  <nav>
    <a class="site-name" href="index.html">Koray Karagözler</a>
    <a href="index.html">← Back</a>
  </nav>

  <div class="page-header">
    <h1>Paintings</h1>
    <p>Works on canvas and paper — the studio practice that informs
       everything made on skin.</p>
  </div>

  <div class="paintings-grid">
    <div class="painting-item" onclick="openLightbox(this)">
      <img src="paintings%20Koray/DSC03032.JPG" alt="Painting by Koray Karagözler">
    </div>
    <div class="painting-item" onclick="openLightbox(this)">
      <img src="paintings%20Koray/DSC03033.JPG" alt="Painting by Koray Karagözler">
    </div>
    <div class="painting-item" onclick="openLightbox(this)">
      <img src="paintings%20Koray/DSC03046.JPG" alt="Painting by Koray Karagözler">
    </div>
    <div class="painting-item" onclick="openLightbox(this)">
      <img src="paintings%20Koray/IMG_0838.jpg" alt="Painting by Koray Karagözler">
    </div>
    <div class="painting-item" onclick="openLightbox(this)">
      <img src="paintings%20Koray/IMG_0839.jpg" alt="Painting by Koray Karagözler">
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <img id="lightbox-img" src="" alt="">
  </div>

  <footer>
    <span>© 2025 Koray Karagözler</span>
    <a href="https://www.instagram.com/koray.karagozler/" target="_blank" rel="noopener">Instagram</a>
  </footer>

  <script>
    function openLightbox(el) {
      const src = el.querySelector('img').src;
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('active');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>

</body>
</html>
