<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paintings — Koray Karagözler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #fff;
      color: #111;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 3vw;
      height: 44px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    nav a {
      text-decoration: none;
      color: #111;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    nav .site-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      text-transform: none;
    }

    /* ── PAINTING SLIDES ── */
    /* Seamless: no margin, no gap, no border between slides */
    .paintings-stack {
      padding-top: 44px; /* push entire stack below fixed nav */
    }

    .painting-slide {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;       /* crop — this is the parallax crop container */
    }

    /* The image is taller than 100vh so it has room to move */
    .painting-slide img {
      position: absolute;
      left: 0;
      width: 100%;
      height: 130%;           /* 30% extra = 15% headroom above + below */
      top: -15%;              /* start centred */
      object-fit: cover;      /* fill the slide — crop parallax inside */
      object-position: center;
      will-change: transform;
    }

    /* ── FOOTER ── */
    footer {
      padding: 2rem 4vw;
      border-top: 1px solid #e8e8e8;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      color: #888;
    }

    footer a { color: #888; text-decoration: none; }
    footer a:hover { color: #111; }

    footer { flex-wrap: wrap; gap: 1rem; }
    .footer-links { display: flex; gap: 2rem; }

    @media (max-width: 480px) {
      footer { flex-direction: column; align-items: flex-start; }
      .footer-links { gap: 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="site-name" href="index.html">Koray Karagözler</a>
    <a href="index.html">← Back</a>
  </nav>

  <div class="paintings-stack">
    <div class="painting-slide"><img src="paintings%20Koray/DSC03032.JPG"  alt="Painting by Koray Karagözler"></div>
    <div class="painting-slide"><img src="paintings%20Koray/DSC03033.JPG"  alt="Painting by Koray Karagözler"></div>
    <div class="painting-slide"><img src="paintings%20Koray/DSC03046.JPG"  alt="Painting by Koray Karagözler"></div>
    <div class="painting-slide"><img src="paintings%20Koray/IMG_0838.jpg"  alt="Painting by Koray Karagözler"></div>
    <div class="painting-slide"><img src="paintings%20Koray/IMG_0839.jpg"  alt="Painting by Koray Karagözler"></div>
  </div>

  <footer>
    <span>© 2026 Koray Karagözler</span>
    <div class="footer-links">
      <a href="https://www.instagram.com/koray.karagozler/" target="_blank" rel="noopener">Instagram</a>
      <a href="impressum.html">Impressum</a>
      <a href="datenschutz.html">Datenschutz</a>
    </div>
  </footer>

  <script>
    /* ── CROP PARALLAX ────────────────────────────────────
       Image is 140% tall inside a 100vh overflow:hidden wrap.
       As the slide scrolls through the viewport, the image
       is shifted so the centre of the slide always shows the
       centre of the image — creating a smooth crop parallax.
    ──────────────────────────────────────────────────────── */
    const slides = document.querySelectorAll('.painting-slide');

    function applyParallax() {
      slides.forEach(slide => {
        const img    = slide.querySelector('img');
        const rect   = slide.getBoundingClientRect();
        // progress: -1 (above) → 0 (centred in viewport) → +1 (below)
        const progress = (rect.top + rect.height / 2 - window.innerHeight / 2)
                         / window.innerHeight;
        // Shift within the 30% extra height (±15% of slide height)
        const shift = progress * 15;
        img.style.transform = `translateY(${shift}%)`;
      });
    }

    window.addEventListener('scroll', applyParallax, { passive: true });
    applyParallax();
  </script>

</body>
</html>
