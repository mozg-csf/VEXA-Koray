<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paintings — Koray Karagözler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: #fff;
      color: #111;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 3vw;
      height: 44px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    nav a {
      text-decoration: none;
      color: #111;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    nav .site-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      text-transform: none;
    }

    /* ── PAINTING SLIDES ── */
    /* Each slide is 100vh, image fills it with parallax */
    .painting-slide {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* First slide gets top padding for nav */
    .painting-slide:first-of-type {
      margin-top: 44px;
    }

    .painting-slide .parallax-img {
      position: absolute;
      inset: -15% 0;          /* overscan so parallax has room */
      width: 100%;
      height: 130%;
      object-fit: contain;    /* show full painting */
      object-position: center;
      will-change: transform;
    }

    /* Thin divider between slides */
    .painting-slide + .painting-slide::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: #e8e8e8;
      z-index: 2;
    }

    /* ── FOOTER ── */
    footer {
      padding: 2rem 4vw;
      border-top: 1px solid #e8e8e8;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      color: #888;
    }

    footer a { color: #888; text-decoration: none; }
    footer a:hover { color: #111; }

    @media (max-width: 768px) {
      .painting-slide .parallax-img {
        object-fit: contain;
        inset: -10% 0;
        height: 120%;
      }
    }
  </style>
</head>
<body>

  <nav>
    <a class="site-name" href="index.html">Koray Karagözler</a>
    <a href="index.html">← Back</a>
  </nav>

  <div class="painting-slide"><img class="parallax-img" src="paintings%20Koray/DSC03032.JPG"  alt="Painting by Koray Karagözler"></div>
  <div class="painting-slide"><img class="parallax-img" src="paintings%20Koray/DSC03033.JPG"  alt="Painting by Koray Karagözler"></div>
  <div class="painting-slide"><img class="parallax-img" src="paintings%20Koray/DSC03046.JPG"  alt="Painting by Koray Karagözler"></div>
  <div class="painting-slide"><img class="parallax-img" src="paintings%20Koray/IMG_0838.jpg"  alt="Painting by Koray Karagözler"></div>
  <div class="painting-slide"><img class="parallax-img" src="paintings%20Koray/IMG_0839.jpg"  alt="Painting by Koray Karagözler"></div>

  <footer>
    <span>© 2025 Koray Karagözler</span>
    <a href="https://www.instagram.com/koray.karagozler/" target="_blank" rel="noopener">Instagram</a>
  </footer>

  <script>
    // Parallax: shift each image slightly on scroll
    const slides = document.querySelectorAll('.painting-slide');

    function applyParallax() {
      const scrollY = window.scrollY;

      slides.forEach(slide => {
        const img   = slide.querySelector('.parallax-img');
        const rect  = slide.getBoundingClientRect();
        // How far through this slide are we? (-1 above → 0 centre → 1 below)
        const progress = (rect.top + rect.height / 2 - window.innerHeight / 2)
                         / window.innerHeight;
        // Shift ±8% of the slide height
        const shift = progress * 8;
        img.style.transform = `translateY(${shift}%)`;
      });
    }

    window.addEventListener('scroll', applyParallax, { passive: true });
    applyParallax(); // init
  </script>

</body>
</html>
