<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paintings — Koray Karagözler</title>
  <link rel="icon" type="image/jpeg" href="favicon.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #fff;
      color: #111;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 3vw;
      height: 44px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }

    nav a {
      text-decoration: none;
      color: #111;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    nav .site-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      text-transform: none;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: calc(44px + 3.5rem) 5vw 2.5rem;
      border-bottom: 1px solid #ebebeb;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 4vw, 3.5rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .page-header p {
      margin-top: 0.7rem;
      font-size: 0.83rem;
      color: #aaa;
      letter-spacing: 0.03em;
    }

    /* ── MASONRY GRID ── */
    .paintings-grid {
      columns: 2;
      column-gap: 2rem;
      padding: 3rem 5vw 5rem;
    }

    @media (min-width: 1100px) {
      .paintings-grid { columns: 3; }
    }

    @media (max-width: 560px) {
      .paintings-grid {
        columns: 1;
        padding: 2rem 5vw 4rem;
      }
    }

    /* ── PAINTING CARD ── */
    .painting-card {
      break-inside: avoid;
      margin-bottom: 2.5rem;
      cursor: pointer;
    }

    .painting-img-wrap {
      position: relative;
      overflow: hidden;
      background: #f5f5f5;
    }

    .painting-img-wrap img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .painting-card:hover .painting-img-wrap img {
      transform: scale(1.04);
    }

    /* Sold overlay on image */
    .sold-dim {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.3);
      pointer-events: none;
    }

    .sold-badge {
      position: absolute;
      top: 0.9rem;
      left: 0.9rem;
      background: #fff;
      font-size: 0.58rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.28rem 0.7rem;
      pointer-events: none;
      color: #111;
    }

    /* Card info row */
    .painting-info {
      padding: 0.75rem 0 0;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .painting-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.88rem;
      font-weight: 400;
      color: #111;
    }

    .painting-status {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #bbb;
    }

    .painting-status.sold { color: #c0392b; }

    /* ── OVERLAY ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: rgba(10,10,10,0.78);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .overlay-inner {
      display: flex;
      width: 100%;
      max-width: 1080px;
      max-height: 92vh;
      background: #fff;
      position: relative;
      overflow: hidden;
    }

    /* Close button */
    .overlay-close {
      position: absolute;
      top: 0.9rem;
      right: 1rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.4rem;
      line-height: 1;
      color: #111;
      z-index: 10;
      padding: 0.2rem 0.4rem;
      transition: color 0.2s;
    }

    .overlay-close:hover { color: #d94f3d; }

    /* Left — image viewer */
    .overlay-gallery {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f6f6f6;
      padding: 2.5rem 2rem 2rem;
      overflow-y: auto;
      min-width: 0;
    }

    .overlay-main-img {
      width: 100%;
      height: auto;
      max-height: 58vh;
      object-fit: contain;
      display: block;
    }

    /* Thumbnail strip — visible once extras are added */
    .overlay-thumbs {
      display: flex;
      gap: 0.55rem;
      margin-top: 1.2rem;
      flex-wrap: wrap;
    }

    .overlay-thumb {
      width: 68px;
      height: 68px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.55;
      transition: opacity 0.2s, border-color 0.2s;
    }

    .overlay-thumb.active,
    .overlay-thumb:hover {
      opacity: 1;
      border-color: #111;
    }

    /* Right — inquiry form */
    .overlay-form-panel {
      width: 300px;
      flex-shrink: 0;
      padding: 2.5rem 1.8rem 2rem;
      overflow-y: auto;
      border-left: 1px solid #ebebeb;
      display: flex;
      flex-direction: column;
    }

    .overlay-form-panel h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 400;
      margin-bottom: 0.3rem;
    }

    .overlay-painting-label {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 1.8rem;
    }

    /* Form */
    .inquiry-form label {
      display: block;
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #999;
      margin-top: 1.15rem;
      margin-bottom: 0.3rem;
    }

    .inquiry-form label:first-of-type { margin-top: 0; }

    .inquiry-form input,
    .inquiry-form textarea {
      width: 100%;
      border: none;
      border-bottom: 1px solid #ddd;
      padding: 0.45rem 0;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      color: #111;
      background: transparent;
      outline: none;
      -webkit-appearance: none;
      border-radius: 0;
      transition: border-color 0.2s;
    }

    .inquiry-form input[readonly] {
      color: #888;
      cursor: default;
    }

    .inquiry-form input:focus,
    .inquiry-form textarea:focus {
      border-bottom-color: #111;
    }

    .inquiry-form textarea {
      resize: none;
      min-height: 80px;
      line-height: 1.6;
    }

    .btn-submit {
      display: block;
      width: 100%;
      margin-top: 1.8rem;
      padding: 0.82rem;
      background: #111;
      color: #fff;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-submit:hover { background: #333; }

    .form-success {
      display: none;
      padding: 2rem 0;
      text-align: center;
    }

    .form-success strong {
      display: block;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 400;
      margin-bottom: 0.6rem;
    }

    .form-success p {
      font-size: 0.83rem;
      color: #666;
      line-height: 1.7;
    }

    /* ── MOBILE OVERLAY ── */
    @media (max-width: 720px) {
      .overlay { padding: 0; align-items: flex-end; }

      .overlay-inner {
        flex-direction: column;
        max-height: 96vh;
        overflow-y: auto;
        width: 100%;
      }

      .overlay-gallery {
        overflow-y: visible;
        padding: 2.5rem 1.5rem 1.5rem;
      }

      .overlay-main-img { max-height: 42vh; }

      .overlay-form-panel {
        width: 100%;
        border-left: none;
        border-top: 1px solid #ebebeb;
        padding: 1.5rem 1.5rem 3rem;
        overflow-y: visible;
      }
    }

    /* ── FOOTER ── */
    footer {
      padding: 2rem 4vw;
      border-top: 1px solid #e8e8e8;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      color: #888;
      flex-wrap: wrap;
      gap: 1rem;
    }

    footer a { color: #888; text-decoration: none; }
    footer a:hover { color: #111; }

    .footer-links { display: flex; gap: 2rem; }

    @media (max-width: 480px) {
      footer { flex-direction: column; align-items: flex-start; }
      .footer-links { gap: 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="site-name" href="index.html">Koray Karagözler</a>
    <a href="index.html">← Back</a>
  </nav>

  <div class="page-header">
    <h1>Paintings</h1>
    <p>Original works — click any painting to inquire.</p>
  </div>

  <div class="paintings-grid" id="paintingsGrid">
    <!-- Cards injected by JS -->
  </div>

  <!-- ── OVERLAY ── -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-label="Painting detail">
    <div class="overlay-inner">

      <button class="overlay-close" id="overlayClose" aria-label="Close">×</button>

      <!-- Image viewer -->
      <div class="overlay-gallery">
        <img class="overlay-main-img" id="overlayMainImg" src="" alt="">
        <div class="overlay-thumbs" id="overlayThumbs"></div>
      </div>

      <!-- Inquiry form -->
      <div class="overlay-form-panel">
        <h3>Inquire</h3>
        <div class="overlay-painting-label" id="overlayPaintingLabel"></div>

        <form class="inquiry-form" id="inquiryForm"
              action="https://formsubmit.co/koraykaragozler@gmail.com"
              method="POST">
          <!-- Formsubmit.co config -->
          <input type="hidden" name="_subject" value="Painting Inquiry — Koray Karagözler">
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_template" value="box">

          <label>Name</label>
          <input type="text" name="name" required autocomplete="name">

          <label>Artwork</label>
          <input type="text" name="artwork" id="artworkInput" readonly>

          <label>Email</label>
          <input type="email" name="email" required autocomplete="email">

          <label>City</label>
          <input type="text" name="city" autocomplete="address-level2">

          <label>Message</label>
          <textarea name="message" rows="4" placeholder="Tell Koray about your interest…"></textarea>

          <button type="submit" class="btn-submit">Send Inquiry</button>
        </form>

        <div class="form-success" id="formSuccess">
          <strong>Thank you</strong>
          <p>Your inquiry has been sent.<br>Koray will be in touch soon.</p>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <span>© 2026 Koray Karagözler</span>
    <div class="footer-links">
      <a href="https://www.instagram.com/koray_karagozler?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" rel="noopener">Instagram</a>
      <a href="impressum.html">Impressum</a>
      <a href="datenschutz.html">Datenschutz</a>
    </div>
  </footer>

  <script>
    /* ════════════════════════════════════════════════════
       PAINTING DATA
       — sold: true/false
       — extras: [] add more image paths here when available
         e.g. extras: ["paintings Koray/new paintings /2ay-detail.jpg",
                       "paintings Koray/new paintings /2ay-mockup.jpg"]
    ════════════════════════════════════════════════════ */
    const paintings = [
      {
        title: "Untitled I",
        image: "paintings Koray/new paintings /2ay.jpg",
        sold: false,
        extras: []
      },
      {
        title: "Untitled II",
        image: "paintings Koray/new paintings /4a.jpg",
        sold: false,
        extras: []
      },
      {
        title: "Untitled III",
        image: "paintings Koray/new paintings /5.jpg",
        sold: true,
        extras: []
      },
      {
        title: "Untitled IV",
        image: "paintings Koray/new paintings /6.jpg",
        sold: false,
        extras: []
      },
      {
        title: "Untitled V",
        image: "paintings Koray/new paintings /f23.jpg",
        sold: true,
        extras: []
      },
    ];

    /* ── BUILD GRID ── */
    const grid = document.getElementById('paintingsGrid');

    paintings.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'painting-card';
      card.setAttribute('tabindex', '0');
      card.setAttribute('role', 'button');
      card.setAttribute('aria-label', `View ${p.title}`);

      card.innerHTML = `
        <div class="painting-img-wrap">
          <img src="${p.image}" alt="${p.title}" loading="lazy">
          ${p.sold ? '<div class="sold-dim"></div><div class="sold-badge">Sold</div>' : ''}
        </div>
        <div class="painting-info">
          <span class="painting-title">${p.title}</span>
          <span class="painting-status${p.sold ? ' sold' : ''}">${p.sold ? 'Sold' : 'Available'}</span>
        </div>
      `;

      card.addEventListener('click', () => openOverlay(i));
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openOverlay(i); });
      grid.appendChild(card);
    });

    /* ── OVERLAY ── */
    const overlay          = document.getElementById('overlay');
    const overlayMainImg   = document.getElementById('overlayMainImg');
    const overlayThumbs    = document.getElementById('overlayThumbs');
    const overlayLabel     = document.getElementById('overlayPaintingLabel');
    const artworkInput     = document.getElementById('artworkInput');
    const inquiryForm      = document.getElementById('inquiryForm');
    const formSuccess      = document.getElementById('formSuccess');

    function openOverlay(index) {
      const p = paintings[index];

      // Set main image
      overlayMainImg.src = p.image;
      overlayMainImg.alt = p.title;
      overlayLabel.textContent = p.title;
      artworkInput.value = p.title;

      // Build thumbnails (main + extras)
      overlayThumbs.innerHTML = '';
      const allImgs = [p.image, ...p.extras];
      if (allImgs.length > 1) {
        allImgs.forEach((src, idx) => {
          const thumb = document.createElement('img');
          thumb.src = src;
          thumb.className = 'overlay-thumb' + (idx === 0 ? ' active' : '');
          thumb.alt = `${p.title} — view ${idx + 1}`;
          thumb.addEventListener('click', () => {
            overlayMainImg.src = src;
            overlayThumbs.querySelectorAll('.overlay-thumb')
              .forEach(t => t.classList.remove('active'));
            thumb.classList.add('active');
          });
          overlayThumbs.appendChild(thumb);
        });
      }

      // Reset form state
      inquiryForm.style.display = '';
      formSuccess.style.display = 'none';
      inquiryForm.reset();
      artworkInput.value = p.title; // restore after reset

      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeOverlay() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('overlayClose').addEventListener('click', closeOverlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeOverlay(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });

    /* ── FORM SUBMIT via fetch → fallback mailto ── */
    inquiryForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = this.querySelector('.btn-submit');
      btn.textContent = 'Sending…';
      btn.disabled = true;

      fetch(this.action, {
        method: 'POST',
        body: new FormData(this),
        headers: { 'Accept': 'application/json' }
      })
      .then(r => r.ok ? r : Promise.reject())
      .then(() => {
        inquiryForm.style.display = 'none';
        formSuccess.style.display = 'block';
      })
      .catch(() => {
        /* Fallback: open mail client */
        const fd      = new FormData(this);
        const name    = fd.get('name')    || '';
        const email   = fd.get('email')   || '';
        const city    = fd.get('city')    || '';
        const artwork = fd.get('artwork') || '';
        const msg     = fd.get('message') || '';
        const body    = `Name: ${name}\nEmail: ${email}\nCity: ${city}\nArtwork: ${artwork}\n\n${msg}`;
        window.location.href =
          `mailto:koraykaragozler@gmail.com` +
          `?subject=${encodeURIComponent('Painting Inquiry — ' + artwork)}` +
          `&body=${encodeURIComponent(body)}`;
        btn.textContent = 'Send Inquiry';
        btn.disabled = false;
      });
    });
  </script>

</body>
</html>
